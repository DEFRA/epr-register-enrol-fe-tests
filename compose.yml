################################################################################
# Docker Compose file for starting up the service for testing in GitHub workflow
# This template provides comparable infrastructure to the real environment.
#   - mongodb
#   - redis
#   - localstack (s3, sqs, sns)
#
# Both mongo and localstack have init scripts included for setting up resources
# on startup. These scripts are in docker/scripts.
#
# It also includes a selenium-chrome container for running the browser headless.
#
# The services being tested can either be started up here using the latest
# builds from dockerhub.
# In the example each service has a .env config file in docker/config/
# Services can reference each other by their container names.
# e.g. http://cdp-example-node-backend:3001/
#
################################################################################
services:
  ################################################################################
  # Headless browser, used by the test suite to actually run the tests against the
  # containers.
  selenium-chrome:
    image: selenium/standalone-chrome:123.0
    platform: linux/amd64
    ports:
      - 4444:4444
    networks:
      - cdp-tenant

  ################################################################################
  mongodb:
    image: mongo:6
    volumes:
      - ./docker/scripts/mongodb:/docker-entrypoint-initdb.d
      - mongodb-data:/data
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.hello().ok']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  ################################################################################
  floci:
    image: hectorvent/floci:1.5.5-aws
    environment:
      - FLOCI_DEFAULT_REGION=eu-west-2
    env_file:
      - ./docker/config/defaults.env
    volumes:
      - ./docker/scripts/localstack:/etc/floci/init/start.d
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://localhost:4566']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  ################################################################################
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      start_period: 2s
      retries: 5
    networks:
      - cdp-tenant

  ################################################################################
  cdp-uploader:
    image: defradigital/cdp-uploader:${CDP_UPLOADER_VERSION:-latest}
    ports:
      - '7337:7337'
    depends_on:
      floci:
        condition: service_healthy
      redis:
        condition: service_healthy
    links:
      - 'floci:localstack'
      - 'redis:redis'
    env_file:
      - './docker/config/defaults.env'
    environment:
      PORT: 7337
      NODE_ENV: development
      REDIS_HOST: redis
      USE_SINGLE_INSTANCE_CACHE: true
      MOCK_VIRUS_SCAN_ENABLED: true
      MOCK_VIRUS_RESULT_DELAY: 3
      SQS_ENDPOINT: http://floci:4566
      S3_ENDPOINT: http://floci:4566
      SQS_SCAN_RESULTS: http://floci:4566/000000000000/cdp-clamav-results
      SQS_SCAN_RESULTS_CALLBACK: http://floci:4566/000000000000/cdp-uploader-scan-results-callback.fifo
      SQS_DOWNLOAD_REQUESTS: http://floci:4566/000000000000/cdp-uploader-download-requests
      SQS_MOCK_CLAMAV: http://floci:4566/000000000000/mock-clamav
      CONSUMER_BUCKETS: epr-register-enrol-file-uploads,epr-register-enrol-sampling-plans,epr-register-enrol-bes-evidence
    networks:
      - cdp-tenant

  ################################################################################
  #
  # Add the services you want to test below.
  #
  ################################################################################
  epr-register-enrol-frontend:
    image: defradigital/epr-register-enrol-frontend:${EPR_REGISTER_ENROL_FRONTEND:-latest}
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/operator-fe.env
    environment:
      - PORT=3000
    depends_on:
      epr-register-enrol-backend:
        condition: service_started
      redis:
        condition: service_healthy
      floci:
        condition: service_healthy
    links:
      - 'floci:floci'
      - 'redis:redis'
      - 'epr-register-enrol-backend:epr-register-enrol-backend'
    ports:
      - 3000:3000
    healthcheck:
      test: ['CMD', 'curl', 'http://localhost:3000/health']
      interval: 3s
      start_period: 2s
      retries: 3
    networks:
      - cdp-tenant

  ################################################################################
  epr-register-enrol-backend:
    image: defradigital/epr-register-enrol-backend:${EPR_REGISTER_ENROL_BACKEND:-latest}
    platform: linux/amd64
    env_file:
      - ./docker/config/defaults.env
      - ./docker/config/operator-be.env
    environment:
      - PORT=8080
      - LOCALSTACK_ENDPOINT=http://floci:4566
      - Mongo__DatabaseUri=mongodb://mongodb:27017/
      - Mongo__DatabaseName=epr
      - CdpUploader__Url=http://cdp-uploader:7337
      - App__BaseUrl=http://epr-register-enrol-backend:8080
      - CaseWorking__UseStub=true
    depends_on:
      redis:
        condition: service_healthy
      floci:
        condition: service_healthy
      mongodb:
        condition: service_started
      cdp-uploader:
        condition: service_started
    links:
      - 'floci:floci'
      - 'mongodb:mongodb'
      - 'redis:redis'
      - 'cdp-uploader:cdp-uploader'
    ports:
      - 8080:8080
    healthcheck:
      test: ['CMD', 'curl', 'http://epr-register-enrol-backend:8080/health']
      interval: 3s
      start_period: 2s
      retries: 3
    networks:
      - cdp-tenant

volumes:
  mongodb-data:

networks:
  cdp-tenant:
    driver: bridge
